name: Docker Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Build Docker image
      run: docker build -t telegram-buyout-bot .
    
    - name: Test image
      run: |
        docker run --rm telegram-buyout-bot python -c "import bot; print('✅ Import successful')"
