<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            padding: 20px;
            padding-bottom: 80px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        h1 {
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--tg-theme-hint-color);
        }
        
        input[type="text"],
        input[type="number"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--tg-theme-hint-color);
            border-radius: 8px;
            background: var(--tg-theme-secondary-bg-color);
            color: var(--tg-theme-text-color);
            font-size: 16px;
        }
        
        textarea {
            min-height: 120px;
            resize: vertical;
            font-family: inherit;
        }
        
        .product-card {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            position: relative;
        }
        
        .product-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .product-name {
            font-weight: 600;
            font-size: 18px;
        }
        
        .toggle-switch {
            position: relative;
            width: 50px;
            height: 26px;
            background: var(--tg-theme-hint-color);
            border-radius: 13px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .toggle-switch.active {
            background: var(--tg-theme-link-color);
        }
        
        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: left 0.3s;
        }
        
        .toggle-switch.active::after {
            left: 26px;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
            width: 100%;
            margin-top: 8px;
        }
        
        .btn:active {
            opacity: 0.8;
        }

        .btn-delete {
            background: #ff3b30;
            color: white;
        }
        
        .btn-add {
            background: #34c759;
            color: white;
            margin-bottom: 20px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--tg-theme-hint-color);
        }
        
        .hint {
            font-size: 14px;
            color: var(--tg-theme-hint-color);
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛠 Админ-панель</h1>
        
        <button class="btn btn-add" onclick="addProduct()">➕ Добавить товар</button>
        
        <!-- Товары -->
        <div id="products-list" class="loading">Загрузка...</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // API Base URL
        const API_BASE = '/api';

        // Загрузка товаров
        async function loadProducts() {
            try {
                const response = await fetch(`${API_BASE}/products`, {
                    headers: {
                        'Authorization': tg.initData
                    }
                });
                const products = await response.json();
                
                const container = document.getElementById('products-list');
                container.innerHTML = products.map(product => `
                    <div class="product-card">
                        <div class="product-header">
                            <span class="product-name">${product.name || `Товар ${product.id}`}</span>
                            <div class="toggle-switch ${product.is_active ? 'active' : ''}" 
                                 onclick="toggleProduct(${product.id}, ${!product.is_active})">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Название</label>
                            <input type="text" value="${product.name}" 
                                   id="product-name-${product.id}">
                        </div>
                        <div class="form-group">
                            <label>Кешбек (руб.)</label>
                            <input type="number" step="0.01" value="${product.cashback}" 
                                   id="product-cashback-${product.id}">
                        </div>
                        <div class="form-group">
                            <label>Инструкция</label>
                            <textarea id="product-instruction-${product.id}">${product.instruction_text}</textarea>
                            <div class="hint">Включите ссылку на товар и условия</div>
                        </div>
                        <button class="btn" onclick="saveProduct(${product.id})">💾 Сохранить</button>
                        <button class="btn btn-delete" onclick="deleteProduct(${product.id})">🗑 Удалить</button>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading products:', error);
                tg.showAlert('Ошибка загрузки товаров');
            }
        }

        // Добавить товар
        async function addProduct() {
            try {
                const response = await fetch(`${API_BASE}/products`, {
                    method: 'POST',
                    headers: {
                        'Authorization': tg.initData,
                        'Content-Type': 'application/json; charset=utf-8'
                    },
                    body: JSON.stringify({
                        name: 'Новый товар',
                        cashback: 0,
                        instruction_text: 'Инструкция'
                    })
                });
                
                if (response.ok) {
                    tg.showAlert('✅ Товар добавлен!');
                    loadProducts();
                } else {
                    tg.showAlert('❌ Ошибка добавления');
                }
            } catch (error) {
                tg.showAlert('❌ Ошибка добавления');
            }
        }

        // Сохранение товара
        async function saveProduct(id) {
            const name = document.getElementById(`product-name-${id}`).value;
            const cashback = parseFloat(document.getElementById(`product-cashback-${id}`).value);
            const instruction = document.getElementById(`product-instruction-${id}`).value;

            try {
                await fetch(`${API_BASE}/products/${id}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': tg.initData,
                        'Content-Type': 'application/json; charset=utf-8'
                    },
                    body: JSON.stringify({ name, cashback, instruction_text: instruction })
                });
                tg.showAlert('✅ Товар сохранен!');
            } catch (error) {
                tg.showAlert('❌ Ошибка сохранения');
            }
        }

        // Удалить товар
        async function deleteProduct(id) {
            if (!confirm('Удалить товар?')) return;
            
            try {
                const response = await fetch(`${API_BASE}/products/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': tg.initData
                    }
                });
                
                if (response.ok) {
                    tg.showAlert('✅ Товар удален!');
                    loadProducts();
                } else {
                    tg.showAlert('❌ Ошибка удаления');
                }
            } catch (error) {
                tg.showAlert('❌ Ошибка удаления');
            }
        }

        // Переключение активности
        async function toggleProduct(id, isActive) {
            try {
                await fetch(`${API_BASE}/products/${id}/toggle`, {
                    method: 'POST',
                    headers: {
                        'Authorization': tg.initData,
                        'Content-Type': 'application/json; charset=utf-8'
                    },
                    body: JSON.stringify({ is_active: isActive })
                });
                loadProducts();
            } catch (error) {
                tg.showAlert('Ошибка');
            }
        }

        // Инициализация
        loadProducts();
    </script>
</body>
</html>
