services:
  postgres:
    image: postgres:16-alpine    
    container_name: buyout_bot_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-buyout_bot}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      TZ: Europe/Moscow
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bot_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 1G

  redis:
    image: redis:7-alpine
    environment:
      TZ: Europe/Moscow
    container_name: buyout_bot_redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - bot_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 1G

  bot:
    build: .
    environment:
      TZ: Europe/Moscow
    container_name: buyout_bot
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"  # FastAPI Web App
    volumes:
      - ./logs:/app/logs
      - ./credentials.json:/app/credentials.json:ro
    networks:
      - bot_network
    restart: unless-stopped
    command: python main.py
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 1G

volumes:
  postgres_data:
  redis_data:

networks:
  bot_network:
    driver: bridge
