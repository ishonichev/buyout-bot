version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: buyout_bot_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-buyout_bot}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bot_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: buyout_bot_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - bot_network
    restart: unless-stopped

  bot:
    build: .
    container_name: buyout_bot
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./:/app
      - ./credentials.json:/app/credentials.json:ro
    networks:
      - bot_network
    restart: unless-stopped
    command: python main.py

volumes:
  postgres_data:
  redis_data:

networks:
  bot_network:
    driver: bridge
